    <text x="194" y="104" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">SKU: ABC-12345</text>
    <text x="194" y="116" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Price: $29.99</text>
    <text x="194" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Weight: 1.5 kg</text>
    <rect x="152" y="136" width="24" height="24" rx="2" fill="#0f172a" opacity="0.12"/>
    <rect x="155" y="139" width="6"  height="6"  fill="#0f172a"/>
