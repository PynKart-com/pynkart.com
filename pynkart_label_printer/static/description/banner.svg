<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9a3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
    
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerBg)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="80" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="320" r="80" fill="#ffffff" opacity="0.15"/>
  <circle cx="950" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main Content Area -->
  <rect x="50" y="50" width="700" height="300" rx="20" fill="url(#cardGradient)" filter="url(#shadow)"/>
  
  <!-- Icon -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="60" height="40" rx="4" fill="#00d9a3"/>
    <rect x="5" y="8" width="50" height="6" rx="2" fill="#ffffff"/>
    <rect x="5" y="18" width="40" height="6" rx="2" fill="#ffffff"/>
    <rect x="5" y="28" width="30" height="6" rx="2" fill="#ffffff" opacity="0.7"/>
    
    <!-- Barcode -->
    <rect x="10" y="50" width="2" height="20" fill="#0f172a"/>
    <rect x="14" y="50" width="4" height="20" fill="#0f172a"/>
    <rect x="20" y="50" width="2" height="20" fill="#0f172a"/>
    <rect x="24" y="50" width="6" height="20" fill="#0f172a"/>
    <rect x="32" y="50" width="3" height="20" fill="#0f172a"/>
    <rect x="37" y="50" width="2" height="20" fill="#0f172a"/>
    <rect x="41" y="50" width="5" height="20" fill="#0f172a"/>
    <rect x="48" y="50" width="4" height="20" fill="#0f172a"/>
  </g>
  
  <!-- Title -->
  <text x="180" y="120" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0f172a">
    PynKart Label Studio
  </text>
  
  <!-- Subtitle -->
  <text x="180" y="160" font-family="Arial, sans-serif" font-size="24" fill="#475569">
    Professional Label Design &amp; Automation for Odoo
  </text>
  
  <!-- Feature Pills -->
  <g transform="translate(180, 190)">
    <rect x="0" y="0" width="140" height="35" rx="17.5" fill="#00d9a3"/>
    <text x="70" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🔒 100% Private
    </text>
  </g>
  
  <g transform="translate(335, 190)">
    <rect x="0" y="0" width="120" height="35" rx="17.5" fill="#0ea5e9"/>
    <text x="60" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ⚡ 10K+ Labels
    </text>
  </g>
  
  <g transform="translate(470, 190)">
    <rect x="0" y="0" width="100" height="35" rx="17.5" fill="#a855f7"/>
    <text x="50" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🌍 20 Langs
    </text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(180, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">
      ✓ Windows Desktop App  ✓ Odoo Integration  ✓ Batch Printing  ✓ FREE Addon
    </text>
  </g>
  
  <g transform="translate(180, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#475569">
      Compatible: Odoo 14, 15, 16, 17, 18, 19 | Platforms: Online, Odoo.sh, On-Premise
    </text>
  </g>
  
  <!-- Right Side - Mockup -->
  <g transform="translate(800, 60)">
    <!-- Monitor/Screen -->
    <rect x="0" y="0" width="350" height="240" rx="10" fill="#1e293b" filter="url(#shadow)"/>
    <rect x="10" y="10" width="330" height="200" rx="5" fill="#ffffff"/>
    
    <!-- Browser Chrome -->
    <rect x="10" y="10" width="330" height="25" rx="5" fill="#e2e8f0"/>
    <circle cx="25" cy="22.5" r="4" fill="#ef4444"/>
    <circle cx="38" cy="22.5" r="4" fill="#f59e0b"/>
    <circle cx="51" cy="22.5" r="4" fill="#10b981"/>
    
    <!-- Code Editor -->
    <rect x="20" y="45" width="150" height="155" fill="#0f172a"/>
    <rect x="25" y="50" width="100" height="4" rx="2" fill="#00d9a3"/>
    <rect x="25" y="60" width="80" height="4" rx="2" fill="#0ea5e9"/>
    <rect x="25" y="70" width="120" height="4" rx="2" fill="#a855f7"/>
    <rect x="25" y="80" width="90" height="4" rx="2" fill="#00d9a3"/>
    <rect x="25" y="90" width="110" height="4" rx="2" fill="#0ea5e9"/>
    <rect x="25" y="105" width="70" height="4" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="25" y="115" width="100" height="4" rx="2" fill="#00d9a3"/>
    <rect x="25" y="125" width="85" height="4" rx="2" fill="#0ea5e9"/>
    <rect x="25" y="135" width="95" height="4" rx="2" fill="#a855f7"/>
    
    <!-- Label Preview -->
    <rect x="185" y="50" width="145" height="150" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="257.5" y="70" font-family="monospace" font-size="10" fill="#0f172a" text-anchor="middle" font-weight="bold">PRODUCT LABEL</text>
    
    <!-- Barcode in preview -->
    <g transform="translate(200, 85)">
      <rect x="0" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="4" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="9" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="13" y="0" width="5" height="30" fill="#0f172a"/>
      <rect x="20" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="25" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="29" y="0" width="4" height="30" fill="#0f172a"/>
      <rect x="35" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="40" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="44" y="0" width="6" height="30" fill="#0f172a"/>
      <rect x="52" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="57" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="61" y="0" width="4" height="30" fill="#0f172a"/>
      <rect x="67" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="71" y="0" width="5" height="30" fill="#0f172a"/>
      <rect x="78" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="83" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="87" y="0" width="4" height="30" fill="#0f172a"/>
      <rect x="93" y="0" width="3" height="30" fill="#0f172a"/>
      <rect x="98" y="0" width="2" height="30" fill="#0f172a"/>
      <rect x="102" y="0" width="5" height="30" fill="#0f172a"/>
      <rect x="109" y="0" width="2" height="30" fill="#0f172a"/>
    </g>
    
    <text x="257.5" y="135" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">SKU: ABC-12345</text>
    <text x="257.5" y="150" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Price: $29.99</text>
    <text x="257.5" y="165" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Weight: 1.5 kg</text>
    
    <!-- Stand -->
    <rect x="155" y="240" width="40" height="15" rx="2" fill="#475569"/>
    <rect x="125" y="255" width="100" height="5" rx="2" fill="#64748b"/>
  </g>
  
  <!-- Download Badge -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="180" height="50" rx="10" fill="#ffffff" opacity="0.95" filter="url(#shadow)"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00d9a3" text-anchor="middle">
      FREE DOWNLOAD
    </text>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">
      pynkart.com
    </text>
  </g>
</svg>
