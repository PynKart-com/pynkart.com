  <circle cx="700" cy="370" r="45" fill="#ffffff" opacity="0.10"/>
  <circle cx="30"  cy="360" r="50" fill="#ffffff" opacity="0.06"/>

  <!-- White card - left half -->
  <rect x="20" y="30" width="460" height="340" rx="16" fill="url(#card)" filter="url(#shadow)"/>

