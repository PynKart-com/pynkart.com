    </g>
    
    <text x="125" y="195" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">
      Install Addon
    </text>
    
    <text x="125" y="230" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">
      Install FREE addon in
    </text>
