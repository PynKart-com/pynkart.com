    </text>
  </g>
  
  <!-- Bottom Features -->
  <rect x="50" y="540" width="1100" height="50" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <text x="600" y="565" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">
