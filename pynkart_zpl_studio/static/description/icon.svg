<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bgGradient)"/>
  
  <!-- Printer icon base -->
  <g transform="translate(48, 48)">
    <!-- Top paper -->
    <rect x="20" y="10" width="120" height="30" rx="4" fill="url(#iconGradient)" opacity="0.9"/>
    
    <!-- Printer body -->
    <rect x="10" y="40" width="140" height="80" rx="8" fill="#ffffff" opacity="0.95"/>
    
    <!-- Printer details -->
    <rect x="30" y="55" width="100" height="8" rx="2" fill="#00d9a3" opacity="0.8"/>
    <rect x="30" y="70" width="80" height="8" rx="2" fill="#0ea5e9" opacity="0.8"/>
    <rect x="30" y="85" width="60" height="8" rx="2" fill="#00d9a3" opacity="0.6"/>
    
    <!-- Paper coming out bottom -->
    <rect x="25" y="115" width="110" height="45" rx="4" fill="url(#iconGradient)" opacity="0.9"/>
    
    <!-- Barcode on paper -->
    <rect x="35" y="125" width="4" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="42" y="125" width="2" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="47" y="125" width="6" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="56" y="125" width="3" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="62" y="125" width="2" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="67" y="125" width="5" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="75" y="125" width="4" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="82" y="125" width="2" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="87" y="125" width="7" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="97" y="125" width="3" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="103" y="125" width="5" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="111" y="125" width="4" height="25" fill="#0f172a" opacity="0.8"/>
    <rect x="118" y="125" width="2" height="25" fill="#0f172a" opacity="0.8"/>
    
    <!-- Power indicator light -->
    <circle cx="140" cy="50" r="5" fill="#00d9a3" opacity="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- "ZPL" text badge -->
  <rect x="150" y="20" width="80" height="30" rx="15" fill="#ffffff" opacity="0.95"/>
  <text x="190" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">ZPL</text>
</svg>
