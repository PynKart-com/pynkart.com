<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="privacyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="badgeShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="150" rx="20" fill="url(#privacyGrad)" filter="url(#badgeShadow)"/>
  
  <!-- Shine effect -->
  <rect x="0" y="0" width="200" height="150" rx="20" fill="url(#shieldGrad)" opacity="0.1"/>
  
  <!-- Shield Icon -->
  <g transform="translate(30, 35)">
    <path d="M 35 0 L 50 10 L 50 40 C 50 55, 35 65, 35 65 C 35 65, 20 55, 20 40 L 20 10 Z" 
          fill="url(#shieldGrad)" 
          stroke="#ffffff" 
          stroke-width="2" 
          filter="url(#glow)"/>
    
    <!-- Lock inside shield -->
    <rect x="29" y="28" width="12" height="15" rx="2" fill="#a855f7"/>
    <path d="M 31 28 L 31 24 C 31 22, 32 20, 35 20 C 38 20, 39 22, 39 24 L 39 28" 
          fill="none" 
          stroke="#a855f7" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="35" cy="34" r="2" fill="#ffffff"/>
    <rect x="34" y="34" width="2" height="5" rx="1" fill="#ffffff"/>
  </g>
  
  <!-- Text Content -->
  <text x="105" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">
    100% PRIVATE
  </text>
  
  <text x="105" y="85" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.95">
    Zero Data Sharing
  </text>
  
  <text x="105" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">
    All data stays on YOUR Windows PC
  </text>
  
  <!-- Checkmarks -->
  <g transform="translate(105, 120)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.85">
      ✓ No cloud uploads   ✓ No tracking   ✓ GDPR compliant
    </text>
  </g>
</svg>
