  <text x="520" y="177" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">✓</text>
  
  <circle cx="680" cy="170" r="16" fill="#ef4444"/>
  <text x="680" y="177" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">✗</text>
  
  <circle cx="850" cy="170" r="16" fill="#10b981"/>
  <text x="850" y="177" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">✓</text>
  
