<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    
    <filter id="tableShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">
    Why Choose PynKart ZPL Studio?
  </text>
  
  <!-- Table Container -->
  <rect x="50" y="80" width="900" height="480" rx="15" fill="#ffffff" filter="url(#tableShadow)"/>
  
  <!-- Table Header -->
  <rect x="50" y="80" width="900" height="60" rx="15" fill="url(#headerGrad)"/>
  <rect x="50" y="120" width="900" height="20" fill="url(#headerGrad)"/>
  
  <!-- Column Headers -->
  <text x="275" y="118" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Feature
  </text>
  <text x="500" y="118" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    PynKart ZPL Studio
  </text>
  <text x="680" y="118" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Cloud Solutions
  </text>
  <text x="850" y="118" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Manual Printing
  </text>
  
  <!-- Vertical Lines -->
  <line x1="450" y1="140" x2="450" y2="560" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="590" y1="140" x2="590" y2="560" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="770" y1="140" x2="770" y2="560" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Row 1: Data Privacy -->
